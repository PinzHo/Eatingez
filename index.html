<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的食記</title>

  <!-- ✅ Netlify Identity（一定要在 head 裡） -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
    }
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 10px;
    }
    .card {
      display: flex;
      background: white;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .card img {
      width: 140px;
      height: 140px;
      object-fit: cover;
    }
    .card-content {
      padding: 12px;
      flex: 1;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .card-desc {
      color: #666;
      font-size: 14px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      padding: 20px;
    }
    .modal img {
      width: 100%;
      border-radius: 8px;
    }
    .close-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>🍜 我的食記</header>

<div class="container" id="list"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="detail-title"></h2>
    <img id="detail-img" />
    <p id="detail-text"></p>
    <button class="close-btn" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
// 👉 測試資料（之後會改成 CMS 自動讀取）
const data = [
  {
    name: "鹹酥雞攤",
    desc: "甜不辣+青椒超搭",
    img: "https://via.placeholder.com/300",
    detail: "這家鹹酥雞真的很強，甜不辣炸得剛好，青椒很解膩，整體搭配非常舒服。"
  }
];

const list = document.getElementById("list");
if (!list) return;

function render() {
  list.innerHTML = "";
  data.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(index);

    card.innerHTML = `
      <img src="${item.img}" />
      <div class="card-content">
        <div class="card-title">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
      </div>
    `;

    list.appendChild(card);
  });
}

function openModal(index) {
  const item = data[index];
  document.getElementById("detail-title").innerText = item.name;
  document.getElementById("detail-img").src = item.img;
  document.getElementById("detail-text").innerText = item.detail;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// 👉 Netlify Identity 自動導向（重要）
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/";
      });
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  render();
});
</script>

</body>
</html>
